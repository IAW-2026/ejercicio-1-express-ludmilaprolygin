<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta</title>
    <link rel="stylesheet" href="/css/styles.css">
  </head>
  <body>
    <main>
      <nav>
        <a href="/">Inicio</a>
        <a href="/acerca">Acerca</a>
        <a href="/contacto">Contacto</a>

      </nav>
      <h1>Encuesta simple</h1>
      <p>¿Cuál es tu lenguaje de programación favorito?</p>
      <form action="/encuesta" method="POST">
        <label>
          <input type="radio" name="opcion" value="JavaScript" required>
          JavaScript
        </label>
        <label>
          <input type="radio" name="opcion" value="Python">
          Python
        </label>
        <label>
          <input type="radio" name="opcion" value="Java">
          Java
        </label>
        <label>
          <input type="radio" name="opcion" value="Otro">
          Otro
        </label>
        <button type="submit">Enviar encuesta</button>
      </form>
    </main>
    <script src="/js/script.js"></script>
  </body>
</html>
