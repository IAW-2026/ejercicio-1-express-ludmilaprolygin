<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto con fetch</title>
    <link rel="stylesheet" href="/css/styles.css">
  </head>
  <body>
    <main>
      <nav>
        <a href="/">Inicio</a>
        <a href="/acerca">Acerca</a>
        <a href="/contacto">Contacto</a>
        <a href="/contacto-fetch">Contacto fetch</a>
        <a href="/estilos">Estilos</a>
        <a href="/encuesta">Encuesta</a>
        <a href="/mensajes">Mensajes</a>
        <a href="/productos">Productos</a>
        <a href="/frase-view">Frase</a>
      </nav>
      <h1>Contacto con fetch</h1>
      <p>Envía tu nombre y mensaje usando <code>fetch</code> sin recargar la página.</p>
      <form id="contacto-fetch-form">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" required>
        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" name="mensaje" rows="5" required></textarea>
        <button type="submit">Enviar</button>
      </form>
      <div id="resultado" aria-live="polite"></div>
    </main>
    <script src="/js/contacto-fetch.js"></script>
  </body>
</html>
